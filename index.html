<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý Sản phẩm</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background-color: #f2f2f2;
      cursor: pointer;
    }
    /* Zebra striping */
    tbody tr:nth-child(even) {
      background-color: #f9f9f9;
    }
    /* Hover highlight */
    tbody tr:hover {
      background-color: #f1f1f1;
    }
    .form-group {
      margin-bottom: 10px;
    }
    label {
      display: inline-block;
      width: 120px;
    }
    input {
      padding: 5px;
    }
    button {
      padding: 5px 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Quản lý Sản phẩm</h1>

  <div class="form-container">
    <h2>Thêm Sản phẩm</h2>
    <div class="form-group">
      <label for="input-name">Tên sản phẩm:</label>
      <input type="text" id="input-name">
    </div>
    <div class="form-group">
      <label for="input-category">Danh mục:</label>
      <input type="text" id="input-category">
    </div>
    <div class="form-group">
      <label for="input-price">Đơn giá:</label>
      <input type="number" id="input-price">
    </div>
    <div class="form-group">
      <label for="input-quantity">Số lượng:</label>
      <input type="number" id="input-quantity">
    </div>
    <button id="btn-add">Thêm</button>
  </div>

  <h2>Danh sách Sản phẩm</h2>
  <table id="product-table">
    <thead>
      <tr>
        <th>STT</th>
        <th id="th-name">Tên sản phẩm <span id="sort-indicator"></span></th>
        <th>Danh mục</th>
        <th>Đơn giá</th>
        <th>Số lượng</th>
      </tr>
    </thead>
    <tbody id="product-tbody">
    </tbody>
  </table>

  <script>
    let productsData = [];
    let sortAsc = true;
    let nextId = 1;

    function renderTable() {
      const tbody = document.getElementById("product-tbody");
      if (!tbody) return;
      tbody.innerHTML = "";
      productsData.forEach((product, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${index + 1}</td>
          <td>${product.name}</td>
          <td>${product.category}</td>
          <td>${product.price}</td>
          <td>${product.quantity}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    function initializeApp() {
      const tbody = document.getElementById("product-tbody");
      const btnAdd = document.getElementById("btn-add");
      const thName = document.getElementById("th-name");
      const sortIndicator = document.getElementById("sort-indicator");

      if (!tbody || !btnAdd) {
        console.error("Required elements not found");
        return;
      }

      // Load products from JSON
      const xhr = new XMLHttpRequest();
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200 || xhr.status === 0) {
            try {
              productsData = JSON.parse(xhr.responseText);
              if (productsData.length > 0) {
                const maxId = Math.max(...productsData.map(p => p.id));
                nextId = maxId + 1;
              }
              renderTable();
            } catch (e) {
              console.error("Error parsing JSON:", e);
            }
          } else {
            console.error("Failed to load products.json, status:", xhr.status);
          }
        }
      };
      xhr.open('GET', 'products.json');
      xhr.send();

      // Sort by name handler
      if (thName) {
        thName.addEventListener("click", function() {
          if (sortAsc) {
            productsData.sort((a, b) => a.name.localeCompare(b.name));
            sortIndicator.textContent = "▲";
          } else {
            productsData.sort((a, b) => b.name.localeCompare(a.name));
            sortIndicator.textContent = "▼";
          }
          sortAsc = !sortAsc;
          renderTable();
        });
      }

      // Add product handler
      btnAdd.addEventListener("click", function() {
        const nameInput = document.getElementById("input-name");
        const categoryInput = document.getElementById("input-category");
        const priceInput = document.getElementById("input-price");
        const quantityInput = document.getElementById("input-quantity");

        const name = nameInput.value.trim();
        const category = categoryInput.value.trim();
        const price = Number(priceInput.value);
        const quantity = Number(quantityInput.value);

        if (name === "" || name.length < 3) {
          alert("Tên sản phẩm không được rỗng và ít nhất 3 ký tự.");
          return;
        }
        if (price <= 0 || isNaN(price)) {
          alert("Đơn giá phải là số dương.");
          return;
        }
        if (quantity < 1 || !Number.isInteger(quantity)) {
          alert("Số lượng phải là số nguyên >= 1.");
          return;
        }

        const newProduct = {
          id: nextId++,
          name: name,
          category: category,
          price: price,
          quantity: quantity
        };

        productsData.push(newProduct);
        renderTable();

        nameInput.value = "";
        categoryInput.value = "";
        priceInput.value = "";
        quantityInput.value = "";
      });
    }

    // Initialize when DOM is ready
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", initializeApp);
    } else {
      initializeApp();
    }
  </script>
</body>
</html>
